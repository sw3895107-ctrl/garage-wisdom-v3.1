<!DOCTYPE html>
<html>

<head>

<title>Garage Wisdom V4</title>

<link rel="stylesheet" href="dash.css">

</head>

<body>

<header>

<img src="images/logo.png" class="logo">

<h1>Garage Wisdom</h1>

<p class="subtitle">
Real diagnostics. No corporate BS.
</p>

</header>


<section class="dashboard">

<div class="gaugeBox">

<h3>Engine Health</h3>

<div class="gauge">
<div id="engineGauge"></div>
</div>

</div>


<div class="gaugeBox">

<h3>Diagnostic Status</h3>

<div class="gauge">
<div id="codeGauge"></div>
</div>

</div>

</section>


<section class="tools">

<div class="tool">

<img src="images/obd.png">

<h3>OBD Code</h3>

<input id="codeInput" placeholder="Enter code like P0300">

<button onclick="lookupCode()">Decode</button>

</div>


<div class="tool">

<img src="images/wrench.png">

<h3>Ask the Mechanic</h3>

<input id="question"
placeholder="What's the vehicle doing?">

<button onclick="askAI()">Diagnose</button>

</div>

</section>


<section id="responseBox">

<h2>Diagnosis</h2>

<div id="response"></div>

</section>


<footer>

Garage Wisdom — Built by a wrench turner.

</footer>


<script src="dash.js"></script>

</body>
</html>
