<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Garage Wisdom AI</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    input, button { padding: 10px; font-size: 16px; margin: 5px 0; }
    #result { margin-top: 20px; }
  </style>
</head>
<body>
  <h1>Garage Wisdom AI</h1>
  <input type="text" id="code" placeholder="Enter code (e.g., P0300)">
  <button onclick="lookupCode()">Search</button>
  <button onclick="aiDiagnose()">AI Diagnose</button>
  <div id="result"></div>

  <script>
    async function lookupCode() {
      const code = document.getElementById('code').value.trim();
      if(!code) return alert("Enter a code");
      const res = await fetch(`/api/codes/${code}`);
      const data = await res.json();
      const resultDiv = document.getElementById('result');
      if(res.ok) {
        resultDiv.innerHTML = `<h3>${data.code}</h3>
                               <p><strong>Description:</strong> ${data.description}</p>
                               <p><strong>Fix:</strong> ${data.fix}</p>
                               <p><strong>Story:</strong> ${data.story || 'N/A'}</p>`;
      } else {
        resultDiv.innerHTML = `<p style="color:red">${data.error}</p>`;
      }
    }

    async function aiDiagnose() {
      const code = document.getElementById('code').value.trim();
      if(!code) return alert("Enter a code");

      const res = await fetch('/api/ai-diagnose', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code })
      });

      const data = await res.json();
      const resultDiv = document.getElementById('result');
      if(res.ok) {
        resultDiv.innerHTML = `<h3>${data.code} - AI Diagnostic</h3>
                               <p>${data.ai_response}</p>`;
      } else {
        resultDiv.innerHTML = `<p style="color:red">${data.error}</p>`;
      }
    }
  </script>
</body>
</html>
