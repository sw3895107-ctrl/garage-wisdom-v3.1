<!DOCTYPE html>
<html>

<head>

<title>Garage Wisdom</title>

<link rel="stylesheet" href="ui.css">

</head>

<body>

<header>

<h1>Garage Wisdom</h1>
<p class="tagline">AI powered diagnostics built for real garages</p>

</header>


<section class="hero">

<img src="images/car-hero.jpg">

<div class="vehicleInfo">

<h2>Your Vehicle</h2>
<p>Live diagnostics and repair insight</p>

</div>

</section>


<section class="dash">

<div class="gaugeCard">

<h3>RPM</h3>

<canvas id="rpmChart"></canvas>

</div>


<div class="gaugeCard">

<h3>Coolant Temp</h3>

<canvas id="tempChart"></canvas>

</div>


<div class="gaugeCard">

<h3>Battery Voltage</h3>

<canvas id="voltChart"></canvas>

</div>

</section>


<section class="diagram">

<h2>Engine Diagram</h2>

<img src="images/engine-diagram.png" id="engineDiagram">

<div id="partInfo">
Click a part to see what it does
</div>

</section>


<section class="aiPanel">

<h2>Ask the AI Mechanic</h2>

<input id="question"
placeholder="Example: Engine misfires at idle">

<button onclick="ask()">Diagnose</button>

<div id="response"></div>

</section>


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="ui.js"></script>

</body>
</html>
