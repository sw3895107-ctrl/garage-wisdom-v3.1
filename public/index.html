<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garage Wisdom</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#0f172a;
color:white;
margin:0;
padding:0;
text-align:center;
}

header{
background:#020617;
padding:20px;
font-size:28px;
font-weight:bold;
}

.container{
max-width:700px;
margin:auto;
padding:40px 20px;
}

input{
padding:12px;
font-size:18px;
width:220px;
border-radius:6px;
border:none;
margin-right:10px;
}

button{
padding:12px 20px;
font-size:16px;
background:#22c55e;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

#result{
margin-top:30px;
background:#1e293b;
padding:25px;
border-radius:10px;
text-align:left;
}

ul{
padding-left:20px;
}

</style>
</head>

<body>

<header>
Garage Wisdom
</header>

<div class="container">

<h2>Check Engine Code Lookup</h2>

<p>Enter an OBD-II code</p>

<input id="codeInput" placeholder="Example: P0301">
<button onclick="lookupCode()">Search</button>

<div id="result"></div>

</div>

<script>

async function lookupCode(){

const code = document.getElementById("codeInput").value.toUpperCase();
const result = document.getElementById("result");

if(!code){
result.innerHTML="Enter a code.";
return;
}

result.innerHTML="Searching...";

try{

const res = await fetch("https://garage-wisdom-v3-1.onrender.com/api/dtc/"+code);

if(!res.ok){
result.innerHTML="Code not found.";
return;
}

const data = await res.json();

result.innerHTML=
"<h2>"+data.code+" - "+data.title+"</h2>"+
"<p><strong>Explanation:</strong><br>"+data.plainExplanation+"</p>"+
"<p><strong>System:</strong> "+data.system+"</p>"+
"<p><strong>Severity:</strong> "+data.severity+"</p>"+
"<strong>Common Causes</strong>"+
"<ul>"+data.commonCauses.map(c=>"<li>"+c+"</li>").join("")+"</ul>";

}catch(e){

result.innerHTML="Server error.";

}

}

</script>

</body>
</html>
